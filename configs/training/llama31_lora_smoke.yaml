# --- Recipe Metadata ---
training_tag: "llama31-smoke"
description: "Smoke test LoRA on Llama 3.1 8B Instruct"

# --- Model ---
model:
  name: "meta-llama/Llama-3.1-8B-Instruct"
  max_seq_length: 512
  trust_remote_code: false

# --- LoRA ---
lora:
  r: 8
  lora_alpha: 16
  lora_dropout: 0.05
  target_modules:
    - "q_proj"
    - "v_proj"
  bias: "none"
  task_type: "CAUSAL_LM"

# --- Quantization (optional, CUDA only) ---
# Uncomment to enable QLoRA on CUDA GPUs:
# quantization:
#   load_in_4bit: true
#   bnb_4bit_quant_type: "nf4"
#   bnb_4bit_compute_dtype: "bfloat16"
#   bnb_4bit_use_double_quant: true

# --- Training ---
training:
  num_train_epochs: 1
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 2
  learning_rate: 2.0e-4
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.03
  weight_decay: 0.01
  logging_steps: 5
  save_strategy: "epoch"
  max_grad_norm: 0.3
  seed: 42

# --- Data ---
data:
  default_dataset: "yahma/alpaca-cleaned"
  text_field: null            # null = use chat template formatting
  max_samples: 100            # limit for smoke test
