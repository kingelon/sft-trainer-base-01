# --- Recipe Metadata ---
training_tag: "llama31-sql"
description: "LoRA finetuning for text-to-SQL on Llama 3.1 8B Instruct"

# --- Model ---
model:
  name: "meta-llama/Llama-3.1-8B-Instruct"
  max_seq_length: 512
  trust_remote_code: false

# --- LoRA ---
lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
  bias: "none"
  task_type: "CAUSAL_LM"

# --- Training ---
# NOTE: fp16/bf16 auto-adjusted by config.py (MPS → float32, CUDA → bf16)
training:
  num_train_epochs: 3
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 4
  learning_rate: 5.0e-5          # lowered from 2e-4 — safer for MPS float32
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.06             # slightly more warmup for stability
  weight_decay: 0.01
  logging_steps: 10
  save_strategy: "epoch"
  max_grad_norm: 0.3
  seed: 42

# --- Data ---
data:
  default_dataset: "b-mc2/sql-create-context"
  text_field: null
  max_samples: 1000
  format: "sql"
